<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodSafe — Establishment Insights</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light-custom">

    <nav class="navbar navbar-custom shadow-sm py-3">
        <div class="container-fluid px-4">
            <span class="navbar-brand mb-0 h1 fw-bold fs-3 text-white">🥗 FoodSafe</span>
        </div>
    </nav>

    <div class="container my-5">
        
        <div class="row mb-5">
            <div class="col-12">
                <div class="card p-4 profile-card border-0 text-white shadow">
                    <h2 class="fw-bold mb-1">Burgers & Bites Cafe</h2>
                    <p class="mb-3 opacity-90">License Reference: <strong>#LIC-2026-9941</strong> | Status: <span class="badge badge-orange">Active Inspection Mode</span></p>
                    <div class="d-flex flex-wrap gap-4 pt-2 border-top border-white border-opacity-25">
                        <div><strong>Last Audited:</strong> May 18, 2026</div>
                        <div><strong>Historical Violations Logged:</strong> 14 Instances</div>
                        <div><strong>Evaluation Scope:</strong> 12-Month Cycle</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            
            <div class="col-12 col-lg-4">
                <div class="card h-100 p-3 chart-card border-0 shadow-sm bg-white">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title text-center text-dark fw-bold mb-4">Violation Profile Density</h5>
                        <div class="chart-wrapper flex-grow-1">
                            <canvas id="violationHistoryChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-4">
                <div class="card h-100 p-3 chart-card border-0 shadow-sm bg-white">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title text-center text-dark fw-bold mb-4">Portal Search Origins</h5>
                        <div class="chart-wrapper flex-grow-1">
                            <canvas id="trafficSourcesChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-4">
                <div class="card h-100 p-3 chart-card border-0 shadow-sm bg-white">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title text-center text-dark fw-bold mb-4">Inspection Score Trends</h5>
                        <div class="chart-wrapper flex-grow-1">
                            <canvas id="scoreTrendChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
